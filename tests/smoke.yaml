model: "claude-sonnet-4-20250514"
provider: openrouter
repo_path: "./repos/test_repo"
session_mode: isolated
tags: ["smoke-test"]

system_prompt: |
  You are exploring a small Python project. Use MEMORY.md to keep notes.

max_turns: 10
permission_mode: bypassPermissions

tracked_files:
  - path: "MEMORY.md"
    seed_content: "# Project Notes\n"

sessions:
  - session_index: 1
    prompt: "Read MEMORY.md, then read main.py. Write a brief summary of what you found to MEMORY.md."
