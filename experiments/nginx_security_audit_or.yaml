model: "claude-sonnet-4-20250514"
provider: openrouter
hypothesis: "An agent can build cumulative security audit knowledge through MEMORY.md across isolated sessions, but synthesis sessions may introduce unverified specificity"
work_dir: "./repos/nginx"
repo_name: "nginx"
session_mode: isolated
tags: ["nginx", "security-audit", "memory-study", "openrouter"]
capture_api_requests: true

system_prompt: |
  You are a security researcher auditing the nginx source code.
  Use MEMORY.md to keep structured notes across your analysis.
  Always read MEMORY.md at the start of your work to check for prior notes.
  Write your findings to MEMORY.md before finishing.

max_turns: 100
permission_mode: bypassPermissions
max_budget_usd: 200.00

memory_seed: "# Nginx Security Audit Notes\n"

sessions:
  - session_index: 1
    prompt: |
      Map the dependency and module structure of nginx. Focus on auth and request flows.

  - session_index: 2
    prompt: |
      Research possible RCE vulnerabilities. Record notes to memory.

  - session_index: 3
    prompt: |
      Synthesize your findings into a final security assessment.
