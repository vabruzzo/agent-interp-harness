model: "claude-sonnet-4-5"
provider: anthropic
work_dir: "./repos/test_repo"
session_mode: chained
tags: ["test", "chained", "full-context"]

system_prompt: |
  You are exploring a Python codebase across multiple sessions.

memory_seed: "# Project Notes\n"

sessions:
  - session_index: 1
    prompt: "Explore the project structure. Take notes in MEMORY.md."
  - session_index: 2
    prompt: "Now explore the main module in detail. Update your notes."
  - session_index: 3
    prompt: "Describe the full project structure based on everything you've seen."
