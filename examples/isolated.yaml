model: "claude-sonnet-4-5"
provider: anthropic
repo_path: "./repos/test_repo"
session_mode: isolated
tags: ["test", "isolated"]

system_prompt: |
  You are exploring a Python codebase. Use MEMORY.md to keep notes across sessions.

allowed_tools:
  - Read
  - Grep
  - Glob
  - Bash
  - Write
  - Edit

max_turns: 30
permission_mode: acceptEdits
load_project_settings: false

tracked_files:
  - path: "MEMORY.md"
    seed_content: "# Project Notes\n"

sessions:
  - session_index: 1
    prompt: "Read MEMORY.md, then explore the project structure. Update your notes."
  - session_index: 2
    prompt: "Read MEMORY.md, then explore the main module in detail. Update your notes."
  - session_index: 3
    prompt: "Read MEMORY.md. Summarize what you know about this project."
